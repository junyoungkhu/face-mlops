name: CI/CD Pipeline - Docker Build and Push

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'shuttle_api/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'shuttle_api/**'

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Github Actions의 빌드 캐시를 활용하기 위한 Buildx 엔진 설정
          driver-opts: image=moby/buildkit:master

      - name: Login to Docker Hub
        # PR(풀 리퀘스트) 이벤트가 아닐 때만 로그인 수행
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Metadata (Tags, Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/shuttle-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          # 리포지토리 루트에서 /shuttle_api 를 Build Context로 지정
          context: ./shuttle_api
          file: ./shuttle_api/Dockerfile
          # PR이 아닌 경우에만 이미지를 Docker Hub에 Push
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # cache-from, cache-to를 통해 GitHub Actions 캐시를 Docker 빌드 캐시로 활용하여 빌드 속도를 획기적으로 개선합니다
          cache-from: type=gha
          cache-to: type=gha,mode=max
